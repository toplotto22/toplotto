services:
  - type: web
    name: top-lotto-backend
    runtime: python
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false   # set to your MongoDB Atlas URI
      - key: DB_NAME
        value: toplotto
      - key: CORS_ORIGINS
        sync: false   # comma-separated list of frontend origins
      - key: JWT_SECRET
        generateValue: true
      - key: LOTTERY_API_TOKEN
        sync: false   # 64578|...
      - key: ADMIN_INITIAL_EMAIL
        sync: false
      - key: ADMIN_INITIAL_PASSWORD
        sync: false

  - type: web
    name: top-lotto-frontend
    runtime: static
    rootDir: frontend
    buildCommand: yarn install --frozen-lockfile && yarn build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false  # https://top-lotto-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
